name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim and Lua tools
        run: brew install neovim stylua luacheck

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Test
        run: make test

